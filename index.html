<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 점심 어디 가지?</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Utensils, MapPin, RefreshCw, Store } = lucide;

        const RESTAURANT_LIST = [
            "참잘돼지국밥", "서울깍두기", "돈카이", "스구식탁", "비빔밥(우정)", 
            "은화수 식당", "부산식(제육)", "샌럽잇", "육회비빔밥", 
            "일화정 연탄쭈꾸미", "개미집", "백소정", "핵밥", "꼬막짬뽕"
        ];

        function App() {
            const [picks, setPicks] = useState({ first: "1순위 식당", second: "2순위 식당" });
            const [isRolling, setIsRolling] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const timerRef = useRef(null);

            const startRolling = () => {
                if (isRolling) return;
                setIsRolling(true);
                setShowResult(false);
                let count = 0;
                timerRef.current = setInterval(() => {
                    const r1 = RESTAURANT_LIST[Math.floor(Math.random() * RESTAURANT_LIST.length)];
                    const r2 = RESTAURANT_LIST[Math.floor(Math.random() * RESTAURANT_LIST.length)];
                    setPicks({ first: r1, second: r2 });
                    if (++count >= 20) {
                        clearInterval(timerRef.current);
                        setIsRolling(false);
                        setShowResult(true);
                    }
                }, 80);
            };

            return (
                <div className="min-h-screen bg-indigo-50 flex flex-col items-center p-4">
                    <header className="text-center my-8">
                        <h1 className="text-3xl font-bold text-indigo-600 flex items-center gap-2">
                            <MapPin /> 오늘 점심 어디 가지?
                        </h1>
                    </header>
                    <main className="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 border border-indigo-100">
                        <div className="flex flex-col gap-4 min-h-[250px] justify-center text-center">
                            <div className={`p-6 rounded-2xl border-2 ${showResult ? 'bg-indigo-50 border-indigo-500' : 'bg-slate-50 border-slate-100'}`}>
                                <Store className="mx-auto mb-2 text-indigo-400" />
                                <h2 className="text-2xl font-bold">{picks.first}</h2>
                            </div>
                            <div className="p-4 rounded-2xl border-2 border-dashed bg-white border-slate-200">
                                <h3 className="text-lg font-semibold text-slate-500">{picks.second}</h3>
                            </div>
                        </div>
                        <button onClick={startRolling} disabled={isRolling} className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-xl text-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all">
                            {isRolling ? <RefreshCw className="animate-spin" /> : <Utensils />}
                            {isRolling ? "식당 고르는 중..." : "식당 추천 받기"}
                        </button>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
